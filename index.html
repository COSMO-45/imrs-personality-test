<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMRS 人格测试 - 滚动的天空玩家专属</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f9fc;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --btn-back: #b2bec3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #636e72;
            font-size: 1.1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
            position: relative;
        }

        .question-card {
            display: none;
        }

        .question-card.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
            color: var(--text-color);
        }

        .option-btn:hover {
            border-color: var(--secondary-color);
            background-color: #f0fffe;
            transform: translateX(5px);
        }

        /* 底部按钮容器 */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            height: 50px; /* 占位防止跳动 */
        }

        .back-btn {
            padding: 10px 20px;
            background-color: var(--btn-back);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .back-btn.visible {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }

        .back-btn:hover {
            background-color: #636e72;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #dfe6e9;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .result-card {
            display: none;
            text-align: center;
        }

        /* 结果页图片样式 */
        .result-image-container {
            width: 100%;
            max-width: 500px;
            height: 500px;
            margin: 0 auto 20px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .result-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 副标题样式 */
        .result-subtitle {
            font-size: 1.6rem;
            color: var(--secondary-color);
            margin-bottom: 15px;
            font-weight: bold;
            line-height: 1.4;
        }

        /* 简介样式 - 分行处理 */
        .result-desc-container {
            text-align: left;
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid var(--secondary-color);
            color: #2d3436;
        }

        .quote-line {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block;
            font-style: italic;
        }

        .desc-line {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #636e72;
            display: block;
        }

        .restart-btn {
            padding: 15px 40px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .restart-btn:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .question-text { font-size: 1.1rem; }
            .card { padding: 20px; }
            .result-image-container { 
                height: 350px; 
                max-width: 100%;
            }
            .result-subtitle {
                font-size: 1.4rem;
            }
            .quote-line {
                font-size: 1.2rem;
            }
            .desc-line {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>IMRS 人格测试</h1>
        <div class="subtitle">测测你是《滚动的天空》中的哪种玩家？</div>
    </header>

    <div id="quiz-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div id="questions-wrapper">
            <!-- 问题将通过 JS 动态插入 -->
        </div>
        
        <!-- 底部按钮区 -->
        <div class="card-footer">
            <button id="back-btn" class="back-btn" onclick="goBack()">← 返回上一题</button>
            <!-- 右侧留空或放其他东西，目前不需要 -->
        </div>
    </div>

    <div id="result-container" class="card result-card">
        <!-- 图片容器 -->
        <div class="result-image-container">
            <img id="res-img" class="result-image" src="" alt="人格结果图">
        </div>
        
        <!-- 副标题 -->
        <div class="result-subtitle" id="res-subtitle"></div>
        
        <!-- 简介容器 (包含引用和描述) -->
        <div class="result-desc-container">
            <span class="quote-line" id="res-quote"></span>
            <span class="desc-line" id="res-desc"></span>
        </div>
        
        <button class="restart-btn" onclick="location.reload()">再测一次</button>
    </div>
</div>

<script>
    // 题目数据
    const questions = [

        { q: "你在社区里看到有人发调时间买电音关的教学，你会：", options: [

        { q: "你心中 RS 最强的玩家是：", options: [

        "ENFP": { subtitle: "WOC！我是恐龙！", quote: "嗷嗷嗷嗷！！！嗷嗷！嗷嗷嗷！", desc: "你情绪充沛，充满活力（和噪音），玩游戏全靠一股热血和直觉。", imgName: "DINO" },
        
        "INTJ": { subtitle: "技巧全能大师", quote: "诶！我带你走一条小路！", desc: "你不仅技术高超，还能洞察关卡的本质，找到最优解，是大神中的大神。", imgName: "PRO" },
        "INFJ": { subtitle: "神秘面具伪人", quote: "你知道 rs 有多少个面具吗？", desc: "你深邃神秘，知道很多不为人知的彩蛋和内幕，让人捉摸不透。", imgName: "MASK" },
        
        "INTP": { subtitle: "只是站在这里的保安", quote: "我只是保安，都与我无关。", desc: "你冷静旁观，逻辑自洽，对社区的纷争漠不关心，只活在自己的逻辑世界里。", imgName: "LOOK" },
        "INFP": { subtitle: "深山中的武林大师", quote: "你要尝尝我的竹子吗？", desc: "你佛系、隐居，有自己的节奏，看似慢吞吞实则内力深厚。", imgName: "PAND-A" },
        
        "ENFJ": { subtitle: "自带 BGM 入场", quote: "不知道，我的身材很曼妙。", desc: "你享受展示自己，是社区的焦点，自带气场，喜欢感染他人。", imgName: "SEXY" },
        "ESFJ": { subtitle: "行走的投诉", quote: "我我要要投诉你！！！", desc: "你极度在意秩序和他人感受（或者觉得被冒犯），喜欢通过外部手段维护正义。", imgName: "TOSU" },
        
        "ISTP": { subtitle: "一个墩子，纯挡路", quote: "叽里咕噜说啥呢，撞我你就重开吧。", desc: "你像墩子一样冷漠且致命，讲究物理法则，你菜你就要死，莫得感情。", imgName: "BLOC-K" },
        "ISFP": { subtitle: "存在于时间线之外的神秘人", quote: "我电音关咋没了？", desc: "你活在自己的世界里，对版本变迁有独特的感性认知，神秘莫测。", imgName: "WALK" }
    };

    let currentQuestion = 0;
    // 记录用户的答案，以便返回修改时恢复分数计算逻辑（简化版：返回时只回退索引，分数重新计算或动态调整）
    // 为了简单起见，我们采用“重算”策略：每次渲染问题时，分数基于 userAnswers 数组重新计算
    let userAnswers = new Array(questions.length).fill(null); 

    function calculateScores() {
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        for (let i = 0; i < currentQuestion; i++) {
            if (userAnswers[i]) {
                const type = userAnswers[i];
                if (type !== 'X') {
                    scores[type]++;
                }
            }
        }
        return scores;
    }

    function renderQuestion() {
        const wrapper = document.getElementById('questions-wrapper');
        const backBtn = document.getElementById('back-btn');
        
        if (!wrapper) return;
        wrapper.innerHTML = '';
        
        // 控制返回按钮显示
        if (currentQuestion > 0) {
            backBtn.classList.add('visible');
        } else {
            backBtn.classList.remove('visible');
        }

        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }

        const qData = questions[currentQuestion];
        const card = document.createElement('div');
        card.className = 'question-card active';
        
        const progress = ((currentQuestion) / questions.length) * 100;
        const progressBar = document.getElementById('progress');
        if (progressBar) {
            progressBar.style.width = progress + '%';
        }

        let optionsHtml = '';
        for (let i = 0; i < qData.options.length; i++) {
            const opt = qData.options[i];
            const label = String.fromCharCode(65 + i);
            // 检查是否已经选过这个选项（用于返回时高亮，可选功能，这里暂不实现高亮，只负责跳转）
            optionsHtml += '<button class="option-btn" onclick="handleAnswer(' + i + ')">' + label + '. ' + opt.text + '</button>';
        }

        card.innerHTML = '<div class="question-text">' + (currentQuestion + 1) + '. ' + qData.q + '</div><div class="options">' + optionsHtml + '</div>';
        wrapper.appendChild(card);
    }

    window.handleAnswer = function(optionIndex) {
        const qData = questions[currentQuestion];
        const type = qData.options[optionIndex].type;
        
        // 保存答案
        userAnswers[currentQuestion] = type;
        
        currentQuestion++;
        renderQuestion();
    };

    window.goBack = function() {
        if (currentQuestion > 0) {
            currentQuestion--;
            // 不需要清除 userAnswers[currentQuestion]，这样如果用户再次选择，会覆盖旧值
            // 如果用户只是想看看题目而不改，直接点下一题会覆盖
            // 但如果用户想“取消选择”，目前的逻辑是必须选一个才能继续。
            // 这里简单处理：回退一步，用户重新点击选项即可覆盖之前的选择。
            renderQuestion();
        }
    };

    function calculateMBTI() {
        const scores = calculateScores();
        let mbti = '';
        mbti += (scores.E >= scores.I) ? 'E' : 'I';
        mbti += (scores.S >= scores.N) ? 'S' : 'N';
        mbti += (scores.T >= scores.F) ? 'T' : 'F';
        mbti += (scores.J >= scores.P) ? 'J' : 'P';
        return mbti;
    }

    function showResult() {
        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result-container');
        
        if (quizContainer) quizContainer.style.display = 'none';
        if (!resultContainer) return;
        
        resultContainer.style.display = 'block';
        resultContainer.classList.add('active');

        const mbti = calculateMBTI();
        
        // 默认获取结果
        let result = resultsMap[mbti] || resultsMap['INTP']; 
        
        // --- 🌟 彩蛋逻辑：ISTJ 有 1% 几率变成 EDWI-N 🌟 ---
        if (mbti === 'ISTJ') {
            const randomNum = Math.random(); // 生成 0 到 1 的随机数
            if (randomNum < 0.05) { // 小于 0.05 即 5% 概率
                result = {
                    subtitle: "稳定的人型机器",
                    quote: "收到任何消息都会回你一个 1。",
                    desc: "你像机器一样可靠，一丝不苟，守序中立的典范。你是传说中的神之伟。",
                    imgName: "EDWI-N"
                };
            }
        }
        // ---------------------------------------------------

        const imgElement = document.getElementById('res-img');
        const baseName = result.imgName;
        
        // 设置图片路径
        imgElement.src = 'imrs/' + baseName + '.jpg'; 
        
        // 错误处理
        imgElement.onerror = function() {
            this.src = 'imrs/' + baseName + '.png';
            this.onerror = function() {
                this.src = 'imrs/' + baseName + '.jpeg';
                this.onerror = function() {
                    this.alt = '图片未找到！';
                    this.src = ''; 
                    this.style.display = 'none';
                    const container = this.parentElement;
                    if(container.querySelector('.img-error-msg') === null) {
                        const msg = document.createElement('div');
                        msg.className = 'img-error-msg';
                        msg.style.color = '#ff6b6b';
                        msg.style.padding = '20px';
                        msg.innerText = '⚠️ 图片加载失败\n缺失文件：' + baseName + '.jpg\n请检查 GitHub 仓库 imrs 文件夹中是否有此文件！';
                        container.appendChild(msg);
                    }
                };
            };
        };

        // 设置副标题
        document.getElementById('res-subtitle').innerText = result.subtitle;
        
        // 设置简介（分行 + 引用）
        let quoteText = result.quote;
        if (!quoteText.startsWith('"') && !quoteText.startsWith('"')) {
             quoteText = '"' + quoteText + '"';
        }
        document.getElementById('res-quote').innerText = quoteText;
        document.getElementById('res-desc').innerText = result.desc;
        
        resultContainer.style.animation = 'fadeIn 0.8s ease';
    }

    document.addEventListener('DOMContentLoaded', function() {
        renderQuestion();
    });

</script>

</body>
</html>
